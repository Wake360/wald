name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked --extra corpus --extra dev
      - run: uvx ruff check wald/ tests/
      - run: uvx pyright wald/
      # unit tests: fast, no kernel execution
      - run: uv run pytest tests/ --ignore=tests/test_gates.py -q
      # golden gates G0+G1: rebuild the corpus from scratch (mutation verify
      # executes notebooks) and assert precision/recall/FP thresholds
      - run: uv run wald corpus build --root corpus
      - run: uv run pytest tests/test_gates.py -q
      - run: uv run wald eval --corpus corpus --out evals
      - uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ matrix.python-version }}
          path: evals/

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - run: uv sync --locked --extra corpus --extra dev
      - run: uvx ruff check wald/ tests/
      - run: uvx pyright wald/
      # unit tests only: no corpus build, gates, or eval (they need Jupyter kernel execution)
      - run: uv run pytest tests/ --ignore=tests/test_gates.py -q
