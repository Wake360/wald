name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .[corpus,dev]
      # unit tests: fast, no kernel execution
      - run: pytest tests/ --ignore=tests/test_gates.py -q
      # golden gates G0+G1: rebuild the corpus from scratch (mutation verify
      # executes notebooks) and assert precision/recall/FP thresholds
      - run: wald corpus build --root corpus
      - run: pytest tests/test_gates.py -q
      - run: wald eval --corpus corpus --out evals
      - uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ matrix.python-version }}
          path: evals/
