# Wald flaw taxonomy v1 — the API of the project.
# Adding a flaw class = a record here + a detector + a mutation. Code never
# hardcodes flaw semantics; prompts and reports are generated from this file.

- id: leakage-fit-before-split
  class: leakage
  layer: static
  severity: high
  definition: >
    A transformation (scaler, imputer, encoder, feature selector, PCA,
    vectorizer) is fitted on data that contains the test set.
  book_anchor: "ESL §7.10.2 (the wrong way to do cross-validation)"
  failure_scenario: >
    Test metrics are inflated; the production model will underperform the
    reported numbers.
  fix: >
    Fit the transformer on the training split only; apply transform to the
    test split.

- id: leakage-future-feature
  class: leakage
  layer: static+narrative
  severity: high
  definition: >
    A predictor contains information from after the target moment
    (aggregates computed over the full period, total_/final_ columns,
    churned_at derivatives).
  book_anchor: "ISLP; temporal leakage"
  failure_scenario: >
    The model "predicts" with information unavailable at prediction time;
    offline metrics collapse in production.
  fix: >
    Restrict feature construction to data timestamped before the target;
    audit aggregate windows.

- id: leakage-temporal-shuffle
  class: leakage
  layer: static
  severity: high
  definition: >
    Time-ordered data whose lag, rolling-window, or resampled features
    feed a model evaluation is split with a shuffled protocol —
    train_test_split with default shuffle, a shuffled KFold, or
    non-temporal cross-validation — instead of TimeSeriesSplit,
    shuffle=False, or an explicit temporal cutoff.
  book_anchor: "Hyndman & Athanasopoulos FPP3 §5.10 (time series cross-validation); ESL §7.10"
  failure_scenario: >
    Training rows sit after test rows in time, so the model is scored on
    "predicting" a past it was trained beyond; the reported error
    collapses when the model must forecast an actual future.
  fix: >
    Split by time: an explicit cutoff date, train_test_split(shuffle=False)
    on time-sorted rows, or TimeSeriesSplit for cross-validation.

# Static promotion parked (2026-07-06): the flaw is the PAIR (filter,
# population-scoped claim). The static half sees only the filter — a
# scoped-claim notebook emits the identical 0.55 candidate, so raising it
# above the floor would flag legitimate analysis. Deciding needs the
# narrative layer's claim signal (fusion). plans/v1-completion.md WS-C.
- id: selection-survivorship-cohort
  class: selection
  layer: static+narrative
  severity: high
  definition: >
    A metric or conclusion is computed over a cohort narrowed by an
    outcome-correlated survival or selection step (active users, retained
    accounts, or completers only; or a track record built by repeatedly
    discarding losers and keeping only the winners — the Baltimore-broker
    pattern), while the excluded or eliminated units are absent from the
    data and the conclusion is stated as if it held for the whole original
    population.
  book_anchor: "Survivorship-bias-Wald-Ellenberg; Baltimore broker"
  failure_scenario: >
    Decisions rest on a metric that would look identical even if the
    product destroyed value for the excluded group, or a claimed track
    record that is really the last survivors of many parallel attempts
    whose failures went unreported.
  fix: >
    Compute the metric on the full cohort (including churned units'
    realized values), or scope the claim explicitly to the filtered group.
  narrative_enabled: true
  disqualifiers:
    - The claim is explicitly scoped to the filtered/surviving group (e.g.
      "among active users..." or "of the strategies still running...")
      rather than to the whole original population.
    - The filter column is unrelated to the outcome being measured.
    - The excluded or eliminated units' effect on the outcome is estimated,
      bounded, or otherwise accounted for elsewhere in the analysis (not
      merely their count) — e.g. a churn-adjusted metric or a stated
      worst-case assumption for the missing group.
    - The selection criterion or prediction was fixed and disclosed before
      the outcome was known, rather than chosen after seeing which units
      or attempts happened to succeed.

- id: testing-multiple-uncorrected
  class: testing
  layer: static
  severity: medium
  definition: >
    More than 5 statistical tests (or tests inside a loop) without a
    multiple-comparison correction.
  book_anchor: "Multiple-Testing-FWER-Inflation; Ellenberg"
  failure_scenario: >
    At alpha=0.05 uncorrected testing inflates the family-wise error rate
    far past alpha (1-0.95^n: ~26% at 6 tests, >50% at 14, 99.4% at 100);
    reported findings are increasingly likely to be noise.
  fix: >
    Apply Bonferroni/Holm or FDR (statsmodels multipletests), or declare
    the analysis exploratory and confirm on fresh data.

- id: significance-meaningless
  class: narrative
  layer: narrative
  severity: medium
  definition: >
    A conclusion rests on p<0.05 with a negligible effect size, or claims
    a finding is real on the strength of significance alone from a study
    too small to detect the claimed effect reliably.
  book_anchor: "Statistically-significant-but-meaningless-Ellenberg"
  failure_scenario: >
    Resources committed to an effect too small to matter, or a noise blip
    from an underpowered study mistaken for a real finding.
  fix: >
    Report and interpret effect size with confidence intervals alongside
    the p-value.
  narrative_enabled: true
  disqualifiers:
    - The written conclusion acknowledges an effect size or confidence
      interval alongside the p-value — either stating the number or
      stating that it is reported. Acknowledgment alone is enough; the
      magnitude of the effect, and whether the prose interprets its
      practical significance, do not matter for this disqualifier.
      Only a conclusion entirely silent on effect size fails it, and a
      silent conclusion gets no credit for a value that appears only
      in code or output.
    - The effect size is non-negligible, and the sample was large enough
      to estimate it reliably. A large point estimate from a study too
      small to detect the claimed effect (severely underpowered) does not
      satisfy this disqualifier — an inflated point estimate from a tiny
      sample is exactly the kind of noise that produces "significant"
      findings that don't replicate.

- id: regression-to-mean-claim
  class: narrative
  layer: narrative
  severity: high
  definition: >
    An extreme subgroup selected at time T (tail performers, biggest
    gainers/losers) whose reversion toward the mean by T+1 is read as an
    effect of an intervention applied in between, without a control group
    of equally extreme, untreated units.
  book_anchor: "Regression-to-mean-Ellenberg"
  failure_scenario: >
    The intervention gets credit (or blame) for what is largely the
    random/luck component reverting toward its mean; the real/skill
    component persists regardless of treatment, so the claimed effect will
    not replicate on a fresh extreme-selected sample.
  fix: >
    Compare against a control group of equally extreme units without the
    intervention. Shrinkage estimates correct the estimated level but do
    not establish an effect.
  narrative_enabled: true
  disqualifiers:
    - A control group of equally extreme, untreated units is present
      alongside the treated group, isolating the intervention's effect
      from reversion.
    - The language is explicitly non-causal — it describes reversion or
      convergence toward the mean, not an intervention's effect.
    - The compared subgroup was not selected for being in the tail (e.g.,
      a random sample or the full population) before the comparison.
    - The extreme group is drawn from a heavy-tailed/power-law population
      where persistence at the top or bottom is the structural norm rather
      than a real-plus-random draw around a stable mean (e.g., firm size,
      viral reach, market share in winner-take-all markets) — classical
      regression to the mean does not apply.

- id: linearity-extrapolation
  class: narrative
  layer: narrative
  severity: medium
  definition: >
    A linear fit extrapolated outside the observed data range and read as
    a forecast.
  book_anchor: "Linearity-trap-Ellenberg"
  failure_scenario: >
    Trend projections far outside the data ("everyone obese by 2048")
    drive planning.
  fix: >
    Restrict predictions to the observed range or model saturation
    explicitly; label extrapolations as such.

- id: baserate-accuracy-imbalanced
  class: testing
  layer: static
  severity: medium
  definition: >
    Accuracy is the only reported metric while classes are imbalanced
    (>80/20).
  book_anchor: "accuracy paradox / null-classifier baseline; ISLP ch. 4"
  failure_scenario: >
    A predictor that always outputs the majority class scores the same
    accuracy; the model may have learned nothing.
  fix: >
    Report ROC-AUC / precision-recall / F1 alongside accuracy, and state
    the class balance.
